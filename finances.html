    <script>
        // Initialize data
        const realCurrentYear = new Date().getFullYear();
        let currentYear = realCurrentYear;
        let finances = [];
        let appointments = []; // Will be populated from Firestore
        let patients = [];
        let incomeSort = 'date-desc';
        let expenseSort = 'date-desc';
        let editingExpenseId = null;
        let editingIncomeId = null;
        let expenseListWasOpen = false;
        let incomeListWasOpen = false;

        const appointmentsRef = db.collection('appointments');
        const patientsRef = db.collection('patients');
        const financesRef = db.collection('finances');

        function parseFinanceDate(value) {
            if (!value) return '';
            if (typeof value === 'string') {
                return value.split('T')[0];
            }
            if (value instanceof Date) {
                return value.toISOString().split('T')[0];
            }
            if (value && typeof value.toDate === 'function') {
                return value.toDate().toISOString().split('T')[0];
            }
            if (value && typeof value.seconds === 'number') {
                return new Date(value.seconds * 1000).toISOString().split('T')[0];
            }
            return '';
        }

        function normalizeFinanceDoc(doc) {
            const data = doc.data();
            const dateString = parseFinanceDate(data.dateString) || parseFinanceDate(data.date);
            return {
                id: doc.id,
                ...data,
                dateString
            };
        }

        function loadAppointmentsFromCache() {
            return appointmentsRef.get({ source: 'cache' })
                .then(snapshot => {
                    appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderMonthlyTable();
                })
                .catch(() => {});
        }

        function listenAppointments() {
            appointmentsRef.onSnapshot((snapshot) => {
                appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMonthlyTable();
            });
        }

        function loadFinancesFromCache() {
            return financesRef.get({ source: 'cache' })
                .then(snapshot => {
                    finances = snapshot.docs.map(normalizeFinanceDoc);
                    renderMonthlyTable();
                })
                .catch(() => {});
        }

        function listenFinances() {
            financesRef.onSnapshot((snapshot) => {
                finances = snapshot.docs.map(normalizeFinanceDoc);
                renderMonthlyTable();
                renderAllExpenses();
                renderAllIncome();
            });
        }

        function loadPatientsFromCache() {
            return patientsRef.get({ source: 'cache' })
                .then(snapshot => {
                    patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                })
                .catch(() => {});
        }

        function listenPatients() {
            patientsRef.onSnapshot((snapshot) => {
                patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            });
        }

        loadAppointmentsFromCache();
        listenAppointments();
        loadPatientsFromCache();
        listenPatients();
        loadFinancesFromCache();
        listenFinances();

        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // ==================== THEME ====================
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        // Set active nav
        document.getElementById('navFinances').classList.add('bg-primary-100', 'dark:bg-primary-900', 'text-primary-600', 'dark:text-primary-400');

        // ==================== FINANCES ====================
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];

        function goToCurrentYear() {
            currentYear = realCurrentYear;
            document.getElementById('tableYearHeader').textContent = currentYear;
            renderMonthlyTable();
        }

        function changeYear(offset) {
            currentYear += offset;
            document.getElementById('tableYearHeader').textContent = currentYear;
            renderMonthlyTable();
        }

        function calculateMonthlyData() {
            const monthlyData = [];
            const today = new Date().toISOString().split('T')[0];
            
            for (let month = 0; month < 12; month++) {
                const monthStr = (month + 1).toString().padStart(2, '0');
                const yearMonth = currentYear + '-' + monthStr;
                
                // Calculate income from PAST appointments only (matching green background logic)
                // Income = only appointments that have price defined AND are in the past
                const income = finances
                    .filter(f => f.type === 'income' && f.dateString && f.dateString.startsWith(yearMonth))
                    .reduce((sum, f) => sum + parseFloat(f.amount || 0), 0);

                // Calculate expenses for this month/year
                const monthExpenses = finances.filter(f => f.type === 'expense' && f.dateString && f.dateString.startsWith(yearMonth));
                const expense = monthExpenses.reduce((sum, f) => sum + parseFloat(f.amount || 0), 0);
                
                const profit = income - expense;
                
                monthlyData.push({
                    month: monthNames[month],
                    income: income,
                    expense: expense,
                    profit: profit
                });
            }
            
            return monthlyData;
        }

        function renderMonthlyTable() {
            const data = calculateMonthlyData();
            const tbody = document.getElementById('monthlyTable');
            
            tbody.innerHTML = data.map(d => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                    <td class="px-4 py-3 text-gray-800 dark:text-white">${d.month}</td>
                    <td class="px-4 py-3 text-right text-green-600 dark:text-green-400">$${d.income.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-red-600 dark:text-red-400">$${d.expense.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right ${d.profit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}">$${d.profit.toFixed(2)}</td>
                </tr>
            `).join('');
            
            // Calculate totals
            const totalIncome = data.reduce((sum, d) => sum + d.income, 0);
            const totalExpense = data.reduce((sum, d) => sum + d.expense, 0);
            const totalProfit = totalIncome - totalExpense;
            
            document.getElementById('totalIncome').textContent = '$' + totalIncome.toFixed(2);
            document.getElementById('totalExpense').textContent = '$' + totalExpense.toFixed(2);
            document.getElementById('totalProfit').textContent = '$' + totalProfit.toFixed(2);
            
            document.getElementById('avgIncome').textContent = '$' + (totalIncome / 12).toFixed(2);
            document.getElementById('avgExpense').textContent = '$' + (totalExpense / 12).toFixed(2);
            document.getElementById('avgProfit').textContent = '$' + (totalProfit / 12).toFixed(2);
        }

        // ==================== EXPENSES ====================
        function openExpenseModal() {
            expenseListWasOpen = !document.getElementById('allExpensesModal').classList.contains('hidden');
            closeAllExpensesModal();
            editingExpenseId = null;
            document.getElementById('expenseModalTitle').textContent = 'Add Expense';
            document.getElementById('expenseModalSubmit').textContent = 'Save';
            document.getElementById('expenseForm').reset();
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('expenseModal').classList.remove('hidden');
        }

        function closeExpenseModal() {
            document.getElementById('expenseModal').classList.add('hidden');
            if (expenseListWasOpen) {
                expenseListWasOpen = false;
                showAllExpenses();
            }
        }

        async function editExpense(id) {
            const expense = finances.find(f => f.id === id && f.type === 'expense');
            if (!expense) return;

            expenseListWasOpen = !document.getElementById('allExpensesModal').classList.contains('hidden');
            closeAllExpensesModal();
            editingExpenseId = id;
            document.getElementById('expenseModalTitle').textContent = 'Edit Expense';
            document.getElementById('expenseModalSubmit').textContent = 'Update';
            document.getElementById('expenseForm').reset();
            document.getElementById('expenseDate').value = expense.dateString || new Date().toISOString().split('T')[0];
            document.getElementById('expenseNote').value = expense.note || '';
            document.getElementById('expenseAmount').value = parseFloat(expense.amount || 0).toFixed(2);
            document.getElementById('expenseModal').classList.remove('hidden');
        }

        document.getElementById('expenseForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const expenseData = {
                amount: parseFloat(document.getElementById('expenseAmount').value) || 0,
                category: 'Expense',
                type: 'expense',
                dateString: document.getElementById('expenseDate').value,
                note: document.getElementById('expenseNote').value,
                patientId: null
            };

            if (!editingExpenseId) {
                expenseData.date = firebase.firestore.FieldValue.serverTimestamp();
                await financesRef.add(expenseData);
                alert('Expense saved!');
            } else {
                await financesRef.doc(editingExpenseId).update(expenseData);
                alert('Expense updated!');
            }

            editingExpenseId = null;
            document.getElementById('expenseForm').reset();
            closeExpenseModal();
        });

        function openIncomeModal() {
            incomeListWasOpen = !document.getElementById('allIncomeModal').classList.contains('hidden');
            closeAllIncomeModal();
            document.getElementById('incomeForm').reset();
            populateIncomePatientOptions();
            document.getElementById('incomeDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('incomeModalTitle').textContent = 'Add Income';
            document.getElementById('incomeModalSubmit').textContent = 'Save';
            editingIncomeId = null;
            document.getElementById('incomeModal').classList.remove('hidden');
        }

        function closeIncomeModal() {
            document.getElementById('incomeModal').classList.add('hidden');
            if (incomeListWasOpen) {
                incomeListWasOpen = false;
                showAllIncome();
            }
        }

        function populateIncomePatientOptions() {
            const select = document.getElementById('incomePatientId');
            if (!select) return;
            select.innerHTML = `<option value="">None</option>` + patients.map(patient => {
                const fullName = `${patient.firstName || ''} ${patient.lastName || ''}`.trim() || 'Patient';
                return `<option value="${patient.id}">${fullName}</option>`;
            }).join('');
        }

        document.getElementById('incomeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const incomeData = {
                amount: parseFloat(document.getElementById('incomeAmount').value) || 0,
                category: 'Income',
                type: 'income',
                dateString: document.getElementById('incomeDate').value,
                note: document.getElementById('incomeNote').value || '',
                patientId: document.getElementById('incomePatientId').value || null
            };

            if (!editingIncomeId) {
                incomeData.date = firebase.firestore.FieldValue.serverTimestamp();
                await financesRef.add(incomeData);
                alert('Income saved!');
            } else {
                await financesRef.doc(editingIncomeId).update(incomeData);
                alert('Income updated!');
            }

            editingIncomeId = null;
            document.getElementById('incomeForm').reset();
            closeIncomeModal();
        });

        function editIncome(id) {
            const income = finances.find(f => f.id === id && f.type === 'income');
            if (!income) return;

            incomeListWasOpen = !document.getElementById('allIncomeModal').classList.contains('hidden');
            closeAllIncomeModal();
            editingIncomeId = id;
            document.getElementById('incomeForm').reset();
            populateIncomePatientOptions();
            document.getElementById('incomeDate').value = income.dateString || new Date().toISOString().split('T')[0];
            document.getElementById('incomeNote').value = income.note || '';
            document.getElementById('incomeAmount').value = parseFloat(income.amount || 0).toFixed(2);
            document.getElementById('incomePatientId').value = income.patientId || '';
            document.getElementById('incomeModalTitle').textContent = 'Edit Income';
            document.getElementById('incomeModalSubmit').textContent = 'Update';
            document.getElementById('incomeModal').classList.remove('hidden');
        }

        async function deleteIncome(id) {
            if (!confirm('Are you sure you want to delete this income?')) return;
            await financesRef.doc(id).delete();
            finances = finances.filter(f => f.id !== id);
            renderAllIncome();
        }

        function showAllExpenses() {
            document.getElementById('expenseSearchInput').value = '';
            expenseSort = 'date-desc';
            renderAllExpenses();
            document.getElementById('allExpensesModal').classList.remove('hidden');
        }
        
        function renderAllExpenses() {
            const tbody = document.getElementById('allExpensesTable');
            const search = document.getElementById('expenseSearchInput').value.toLowerCase();
            const yearExpenses = finances.filter(f => f.type === 'expense' && f.dateString && f.dateString.startsWith(currentYear.toString()));
            
            let filtered = yearExpenses.filter(f => 
                (f.note || '').toLowerCase().includes(search) || 
                (f.dateString || '').includes(search) ||
                (f.category || '').toLowerCase().includes(search)
            );
            
            // Apply sorting
            if (expenseSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.dateString) - new Date(b.dateString));
            } else if (expenseSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.dateString) - new Date(a.dateString));
            } else if (expenseSort === 'amount-asc') {
                filtered.sort((a, b) => parseFloat(a.amount) - parseFloat(b.amount));
            } else if (expenseSort === 'amount-desc') {
                filtered.sort((a, b) => parseFloat(b.amount) - parseFloat(a.amount));
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No expenses recorded for ${currentYear}.</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(f => `
                    <tr>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${f.dateString}</td>
                        <td class="px-4 py-2 text-gray-600 dark:text-gray-300">${f.category}</td>
                        <td class="px-4 py-2 text-right text-red-600 dark:text-red-400">$${parseFloat(f.amount).toFixed(2)}</td>
                        <td class="px-4 py-2 text-right">
                            <button onclick="editExpense('${f.id}')" class="px-2 py-1 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded mr-2">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteExpense('${f.id}')" class="px-2 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }
        
        function sortExpenseByDate() {
            expenseSort = expenseSort === 'date-asc' ? 'date-desc' : 'date-asc';
            renderAllExpenses();
        }
        
        function sortExpenseByAmount() {
            expenseSort = expenseSort === 'amount-asc' ? 'amount-desc' : 'amount-asc';
            renderAllExpenses();
        }

        function closeAllExpensesModal() {
            document.getElementById('allExpensesModal').classList.add('hidden');
        }

        async function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            
            await financesRef.doc(id).delete();
            finances = finances.filter(f => f.id !== id);
            renderAllExpenses();
        }

        // ==================== INCOME ====================
        function closeAllIncomeModal() {
            document.getElementById('allIncomeModal').classList.add('hidden');
        }
        function showAllIncome() {
            document.getElementById('incomeSearchInput').value = '';
            incomeSort = 'date-desc';
            renderAllIncome();
            document.getElementById('allIncomeModal').classList.remove('hidden');
        }
        
        function renderAllIncome() {
            const tbody = document.getElementById('allIncomeTable');
            const search = document.getElementById('incomeSearchInput').value.toLowerCase();
            const today = new Date().toISOString().split('T')[0];
            
            const yearFinanceIncome = finances
                .filter(f => f.type === 'income' && f.dateString && f.dateString.startsWith(currentYear.toString()))
                .map(f => {
                    const linkedPatient = patients.find(p => p.id === f.patientId);
                    const patientFullName = linkedPatient ? `${linkedPatient.firstName || ''} ${linkedPatient.lastName || ''}`.trim() : null;
                    return {
                        id: f.id,
                        dateString: f.dateString,
                        patientName: patientFullName || (f.patientId ? 'Patient' : '-'),
                        note: f.note || '-',
                        amount: parseFloat(f.amount || 0)
                    };
                });

            let filtered = yearFinanceIncome.filter(a =>
                (a.patientName || '').toLowerCase().includes(search) ||
                (a.dateString || '').includes(search) ||
                (a.note || '').toLowerCase().includes(search)
            );
            
            // Apply sorting
            if (incomeSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.dateString) - new Date(b.dateString));
            } else if (incomeSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.dateString) - new Date(a.dateString));
            } else if (incomeSort === 'amount-asc') {
                filtered.sort((a, b) => a.amount - b.amount);
            } else if (incomeSort === 'amount-desc') {
                filtered.sort((a, b) => b.amount - a.amount);
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No income recorded for ${currentYear}.</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(a => `
                    <tr>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${a.dateString}</td>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${a.patientName}</td>
                        <td class="px-4 py-2 text-gray-600 dark:text-gray-300">${a.note || '-'}</td>
                        <td class="px-4 py-2 text-right text-green-600 dark:text-green-400">$${a.amount.toFixed(2)}</td>
                        <td class="px-4 py-2 text-right">
                            <button onclick="editIncome('${a.id}')" class="px-2 py-1 bg-blue-500 hover:bg-blue-600 text-white text-xs rounded mr-2">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteIncome('${a.id}')" class="px-2 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }
        
        function sortIncomeByDate() {
            incomeSort = incomeSort === 'date-asc' ? 'date-desc' : 'date-asc';
            renderAllIncome();
        }
        
        function sortIncomeByAmount() {
            incomeSort = incomeSort === 'amount-asc' ? 'amount-desc' : 'amount-asc';
            renderAllIncome();
        }

        // Initialize
        renderMonthlyTable();
    </script>
</body>
</html>
