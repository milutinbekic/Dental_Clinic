<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finances - Dental Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary-100 dark:bg-primary-900 rounded-full flex items-center justify-center">
                        <i class="fas fa-tooth text-primary-600 dark:text-primary-400"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800 dark:text-white">Dental Clinic</span>
                </div>
                <div class="flex space-x-1">
                    <button onclick="window.location.href='appointments.html'" id="navAppointments"
                        class="nav-btn px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i class="fas fa-calendar-alt mr-2"></i>Appointments
                    </button>
                    <button onclick="window.location.href='patients.html'" id="navPatients"
                        class="nav-btn px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i class="fas fa-users mr-2"></i>Patients
                    </button>
                    <button onclick="window.location.href='finances.html'" id="navFinances"
                        class="nav-btn px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i class="fas fa-dollar-sign mr-2"></i>Finances
                    </button>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i id="themeIcon" class="fas fa-moon text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
                        <i class="fas fa-sign-out-alt mr-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="pt-20 pb-8 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Finances</h2>
                <div class="flex space-x-2">
                    <button onclick="openExpenseModal()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                        <i class="fas fa-minus-circle mr-2"></i>Add Expense
                    </button>
                    <button onclick="showAllExpenses()" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg transition-colors">
                        <i class="fas fa-receipt mr-2"></i>View Expenses
                    </button>
                    <button onclick="showAllIncome()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">
                        <i class="fas fa-chart-line mr-2"></i>View Income
                    </button>
                </div>
            </div>

            <!-- Year Navigation -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-4 mb-6">
                <div class="flex justify-between items-center">
                    <button onclick="changeYear(-1)" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-chevron-left mr-1"></i>Previous
                    </button>
                    <h3 class="text-xl font-bold text-gray-800 dark:text-white cursor-pointer hover:text-primary-600" onclick="goToCurrentYear()" title="Click to reset to current year">
                        <span id="currentYearButton">2026</span> (Current Year)
                    </h3>
                    <button onclick="changeYear(1)" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        Next<i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>

            <!-- Monthly Summary Table -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600 dark:text-gray-300"><span id="tableYearHeader">2026</span> - Month</th>
                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-600 dark:text-gray-300">Income</th>
                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-600 dark:text-gray-300">Expense</th>
                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-600 dark:text-gray-300">Profit</th>
                            </tr>
                        </thead>
                        <tbody id="monthlyTable" class="divide-y divide-gray-200 dark:divide-gray-700">
                        </tbody>
                        <tfoot class="bg-gray-100 dark:bg-gray-700">
                            <tr class="font-bold">
                                <td class="px-4 py-3 text-gray-800 dark:text-white">Total (SUM)</td>
                                <td class="px-4 py-3 text-right text-green-600 dark:text-green-400" id="totalIncome">$0</td>
                                <td class="px-4 py-3 text-right text-red-600 dark:text-red-400" id="totalExpense">$0</td>
                                <td class="px-4 py-3 text-right text-gray-800 dark:text-white" id="totalProfit">$0</td>
                            </tr>
                            <tr class="font-bold">
                                <td class="px-4 py-3 text-gray-800 dark:text-white">Average</td>
                                <td class="px-4 py-3 text-right text-green-600 dark:text-green-400" id="avgIncome">$0</td>
                                <td class="px-4 py-3 text-right text-red-600 dark:text-red-400" id="avgExpense">$0</td>
                                <td class="px-4 py-3 text-right text-gray-800 dark:text-white" id="avgProfit">$0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Expense Modal -->
    <div id="expenseModal" class="fixed inset-0 bg-black/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-xl font-semibold text-gray-800 dark:text-white">Add Expense</h3>
            </div>
            <form id="expenseForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date</label>
                    <input type="date" id="expenseDate" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Note</label>
                    <textarea id="expenseNote" rows="2" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                        placeholder="Expense description..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Amount ($)</label>
                    <input type="number" id="expenseAmount" step="0.01" min="0" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                        placeholder="0.00">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeExpenseModal()"
                        class="flex-1 px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-white rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- All Expenses Modal -->
    <div id="allExpensesModal" class="fixed inset-0 bg-black/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center flex-shrink-0">
                <h3 class="text-xl font-semibold text-gray-800 dark:text-white">All Expenses</h3>
                <button onclick="closeAllExpensesModal()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                <div class="flex space-x-2">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="expenseSearchInput" oninput="renderAllExpenses()"
                            class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="Search by note or date...">
                    </div>
                    <button onclick="sortExpenseByDate()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-sort-up mr-1"></i>Date
                    </button>
                    <button onclick="sortExpenseByAmount()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-sort-amount-down mr-1"></i>Amount
                    </button>
                </div>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700">
                            <tr>
                                <th class="px-4 py-2 text-left text-gray-600 dark:text-gray-300">Date</th>
                                <th class="px-4 py-2 text-left text-gray-600 dark:text-gray-300">Note</th>
                                <th class="px-4 py-2 text-right text-gray-600 dark:text-gray-300">Amount</th>
                                <th class="px-4 py-2 text-right text-gray-600 dark:text-gray-300">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="allExpensesTable" class="divide-y divide-gray-200 dark:divide-gray-700">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- All Income Modal -->
    <div id="allIncomeModal" class="fixed inset-0 bg-black/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center flex-shrink-0">
                <h3 class="text-xl font-semibold text-gray-800 dark:text-white">All Income</h3>
                <button onclick="closeAllIncomeModal()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex-shrink-0">
                <div class="flex space-x-2">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="incomeSearchInput" oninput="renderAllIncome()"
                            class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="Search by patient or date...">
                    </div>
                    <button onclick="sortIncomeByDate()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-sort-up mr-1"></i>Date
                    </button>
                    <button onclick="sortIncomeByAmount()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-sort-amount-down mr-1"></i>Amount
                    </button>
                </div>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700">
                            <tr>
                                <th class="px-4 py-2 text-left text-gray-600 dark:text-gray-300">Date</th>
                                <th class="px-4 py-2 text-left text-gray-600 dark:text-gray-300">Patient</th>
                                <th class="px-4 py-2 text-left text-gray-600 dark:text-gray-300">Note</th>
                                <th class="px-4 py-2 text-right text-gray-600 dark:text-gray-300">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="allIncomeTable" class="divide-y divide-gray-200 dark:divide-gray-700">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize data
        const realCurrentYear = new Date().getFullYear();
        let currentYear = realCurrentYear;
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let appointments = JSON.parse(localStorage.getItem('appointments')) || [];
        let incomeSort = 'date-desc';
        let expenseSort = 'date-desc';

        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // ==================== THEME ====================
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        // Set active nav
        document.getElementById('navFinances').classList.add('bg-primary-100', 'dark:bg-primary-900', 'text-primary-600', 'dark:text-primary-400');

        // ==================== FINANCES ====================
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];

        function goToCurrentYear() {
            currentYear = realCurrentYear;
            document.getElementById('tableYearHeader').textContent = currentYear;
            renderMonthlyTable();
        }

        function changeYear(offset) {
            currentYear += offset;
            document.getElementById('tableYearHeader').textContent = currentYear;
            renderMonthlyTable();
        }

        function calculateMonthlyData() {
            const monthlyData = [];
            const today = new Date().toISOString().split('T')[0];
            
            for (let month = 0; month < 12; month++) {
                const monthStr = (month + 1).toString().padStart(2, '0');
                const yearMonth = currentYear + '-' + monthStr;
                
                // Calculate income from PAST appointments only (matching green background logic)
                // Income = only appointments that have price defined AND are in the past
                const monthAppointments = appointments.filter(a => {
                    if (!a.date || !a.price || parseFloat(a.price) <= 0) return false;
                    // Only past appointments (same as green background in calendar)
                    return a.date <= today && a.date.startsWith(yearMonth);
                });
                const income = monthAppointments.reduce((sum, a) => sum + parseFloat(a.price || 0), 0);
                
                // Calculate expenses for this month/year
                const monthExpenses = expenses.filter(e => {
                    return e.date && e.date.startsWith(yearMonth);
                });
                const expense = monthExpenses.reduce((sum, e) => sum + parseFloat(e.amount || 0), 0);
                
                const profit = income - expense;
                
                monthlyData.push({
                    month: monthNames[month],
                    income: income,
                    expense: expense,
                    profit: profit
                });
            }
            
            return monthlyData;
        }

        function renderMonthlyTable() {
            const data = calculateMonthlyData();
            const tbody = document.getElementById('monthlyTable');
            
            tbody.innerHTML = data.map(d => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">
                    <td class="px-4 py-3 text-gray-800 dark:text-white">${d.month}</td>
                    <td class="px-4 py-3 text-right text-green-600 dark:text-green-400">$${d.income.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-red-600 dark:text-red-400">$${d.expense.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right ${d.profit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}">$${d.profit.toFixed(2)}</td>
                </tr>
            `).join('');
            
            // Calculate totals
            const totalIncome = data.reduce((sum, d) => sum + d.income, 0);
            const totalExpense = data.reduce((sum, d) => sum + d.expense, 0);
            const totalProfit = totalIncome - totalExpense;
            
            document.getElementById('totalIncome').textContent = '$' + totalIncome.toFixed(2);
            document.getElementById('totalExpense').textContent = '$' + totalExpense.toFixed(2);
            document.getElementById('totalProfit').textContent = '$' + totalProfit.toFixed(2);
            
            document.getElementById('avgIncome').textContent = '$' + (totalIncome / 12).toFixed(2);
            document.getElementById('avgExpense').textContent = '$' + (totalExpense / 12).toFixed(2);
            document.getElementById('avgProfit').textContent = '$' + (totalProfit / 12).toFixed(2);
        }

        // ==================== EXPENSES ====================
        function openExpenseModal() {
            document.getElementById('expenseForm').reset();
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('expenseModal').classList.remove('hidden');
        }

        function closeExpenseModal() {
            document.getElementById('expenseModal').classList.add('hidden');
        }

        document.getElementById('expenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const expense = {
                id: Date.now(),
                date: document.getElementById('expenseDate').value,
                note: document.getElementById('expenseNote').value,
                amount: parseFloat(document.getElementById('expenseAmount').value)
            };

            expenses.push(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));

            closeExpenseModal();
            renderMonthlyTable();
            alert('Expense saved!');
        });

        function showAllExpenses() {
            document.getElementById('expenseSearchInput').value = '';
            expenseSort = 'date-desc';
            renderAllExpenses();
            document.getElementById('allExpensesModal').classList.remove('hidden');
        }
        
        function renderAllExpenses() {
            const tbody = document.getElementById('allExpensesTable');
            const search = document.getElementById('expenseSearchInput').value.toLowerCase();
            const yearExpenses = expenses.filter(e => e.date && e.date.startsWith(currentYear.toString()));
            
            let filtered = yearExpenses.filter(e => 
                (e.note || '').toLowerCase().includes(search) || 
                (e.date || '').includes(search)
            );
            
            // Apply sorting
            if (expenseSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (expenseSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (expenseSort === 'amount-asc') {
                filtered.sort((a, b) => parseFloat(a.amount) - parseFloat(b.amount));
            } else if (expenseSort === 'amount-desc') {
                filtered.sort((a, b) => parseFloat(b.amount) - parseFloat(a.amount));
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No expenses recorded for ${currentYear}.</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(e => `
                    <tr>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${e.date}</td>
                        <td class="px-4 py-2 text-gray-600 dark:text-gray-300">${e.note}</td>
                        <td class="px-4 py-2 text-right text-red-600 dark:text-red-400">$${parseFloat(e.amount).toFixed(2)}</td>
                        <td class="px-4 py-2 text-right">
                            <button onclick="deleteExpense(${e.id})" class="px-2 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }
        
        function sortExpenseByDate() {
            expenseSort = expenseSort === 'date-asc' ? 'date-desc' : 'date-asc';
            renderAllExpenses();
        }
        
        function sortExpenseByAmount() {
            expenseSort = expenseSort === 'amount-asc' ? 'amount-desc' : 'amount-asc';
            renderAllExpenses();
        }

        function closeAllExpensesModal() {
            document.getElementById('allExpensesModal').classList.add('hidden');
        }

        function deleteExpense(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            
            renderAllExpenses();
            renderMonthlyTable();
        }

        // ==================== INCOME ====================
        function closeAllIncomeModal() {
            document.getElementById('allIncomeModal').classList.add('hidden');
        }
        function showAllIncome() {
            document.getElementById('incomeSearchInput').value = '';
            incomeSort = 'date-desc';
            renderAllIncome();
            document.getElementById('allIncomeModal').classList.remove('hidden');
        }
        
        function renderAllIncome() {
            const tbody = document.getElementById('allIncomeTable');
            const search = document.getElementById('incomeSearchInput').value.toLowerCase();
            const today = new Date().toISOString().split('T')[0];
            
            const yearAppointments = appointments.filter(a => 
                a.date && a.date.startsWith(currentYear.toString()) && 
                a.date <= today && 
                a.price && parseFloat(a.price) > 0
            );
            
            let filtered = yearAppointments.filter(a =>
                (a.patientName || '').toLowerCase().includes(search) ||
                (a.date || '').includes(search)
            );
            
            // Apply sorting
            if (incomeSort === 'date-asc') {
                filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (incomeSort === 'date-desc') {
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (incomeSort === 'amount-asc') {
                filtered.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
            } else if (incomeSort === 'amount-desc') {
                filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
            }
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No income recorded for ${currentYear}.</td></tr>`;
            } else {
                tbody.innerHTML = filtered.map(a => `
                    <tr>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${a.date}</td>
                        <td class="px-4 py-2 text-gray-800 dark:text-white">${a.patientName}</td>
                        <td class="px-4 py-2 text-gray-600 dark:text-gray-300">${a.note || '-'}</td>
                        <td class="px-4 py-2 text-right text-green-600 dark:text-green-400">$${parseFloat(a.price).toFixed(2)}</td>
                    </tr>
                `).join('');
            }
        }
        
        function sortIncomeByDate() {
            incomeSort = incomeSort === 'date-asc' ? 'date-desc' : 'date-asc';
            renderAllIncome();
        }
        
        function sortIncomeByAmount() {
            incomeSort = incomeSort === 'amount-asc' ? 'amount-desc' : 'amount-asc';
            renderAllIncome();
        }

        // Initialize
        renderMonthlyTable();
    </script>
</body>
</html>
