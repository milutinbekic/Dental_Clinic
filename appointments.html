<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - Dental Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <!-- Glavni kontejner: Na mobilnom skida visinu h-16 da bi stala dva reda -->
            <div class="flex flex-col md:flex-row md:items-center md:justify-between py-2 md:h-16">
                
                <!-- BLOK 1: Logo (i na mobilnom Logout/Tema desno od njega) -->
                <div class="flex items-center justify-between w-full md:w-auto">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-primary-100 dark:bg-primary-900 rounded-full flex items-center justify-center">
                            <i class="fas fa-tooth text-primary-600 dark:text-primary-400"></i>
                        </div>
                        <span class="text-xl font-bold text-gray-800 dark:text-white whitespace-nowrap">Dental Clinic</span>
                    </div>

                    <!-- Ovi dugmići su vidljivi OVDE samo na mobilnom -->
                    <div class="flex items-center space-x-2 md:hidden">
                        <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <i id="themeIconMobile" class="fas fa-moon text-gray-600 dark:text-gray-300"></i>
                        </button>
                        <button onclick="logout()" class="px-3 py-1.5 bg-red-500 text-white rounded-lg text-sm">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- BLOK 2: Centralna Navigacija (Appointments, Patients, Finances) -->
                <!-- Na desktopu (md) dobija flex-1 da bi mogla da se centrira -->
                <div class="w-full md:w-auto mt-3 md:mt-0 md:flex-1 md:flex md:justify-center">
                    <div class="grid grid-cols-3 gap-1 md:flex md:space-x-1 p-1 bg-gray-50 dark:bg-gray-700/50 md:bg-transparent rounded-xl">
                        <button onclick="window.location.href='appointments.html'" id="navAppointments"
                            class="nav-btn px-2 py-2 md:px-4 rounded-lg text-xs md:text-base text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-600 transition-all flex flex-col md:flex-row items-center justify-center">
                            <i class="fas fa-calendar-alt md:mr-2 mb-1 md:mb-0"></i>
                            <span>Appointments</span>
                        </button>
                        <button onclick="window.location.href='patients.html'" id="navPatients"
                            class="nav-btn px-2 py-2 md:px-4 rounded-lg text-xs md:text-base text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-600 transition-all flex flex-col md:flex-row items-center justify-center">
                            <i class="fas fa-users md:mr-2 mb-1 md:mb-0"></i>
                            <span>Patients</span>
                        </button>
                        <button onclick="window.location.href='finances.html'" id="navFinances"
                            class="nav-btn px-2 py-2 md:px-4 rounded-lg text-xs md:text-base text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-600 transition-all flex flex-col md:flex-row items-center justify-center">
                            <i class="fas fa-dollar-sign md:mr-2 mb-1 md:mb-0"></i>
                            <span>Finances</span>
                        </button>
                    </div>
                </div>

                <!-- BLOK 3: Logout i Tema (Samo za Desktop) -->
                <div class="hidden md:flex items-center space-x-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i id="themeIcon" class="fas fa-moon text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
                        <i class="fas fa-sign-out-alt mr-1"></i>
                        <span>Logout</span>
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="pt-36 sm:pt-24 pb-8 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="mb-6 flex justify-center">
                <!-- KONTEJNER ZA DUGMAD -->
                <!-- w-full na mobilnom (preko celog ekrana), sm:w-auto na desktopu (samo koliko treba) -->
                <div
                    class="grid grid-cols-3 sm:flex w-full sm:w-auto bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            
                    <!-- PREVIOUS -->
                    <button onclick="changeWeek(-1)"
                        class="flex items-center justify-center py-3 px-6 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 border-r border-gray-200 dark:border-gray-700 transition-colors">
                        <i class="fas fa-chevron-left sm:mr-2"></i>
                        <span class="hidden sm:inline text-sm font-medium">Previous</span>
                    </button>
            
                    <!-- TODAY -->
                    <button onclick="goToToday()"
                        class="flex items-center justify-center py-3 px-8 text-sm font-bold bg-primary-600 sm:bg-transparent text-white sm:text-primary-600 hover:bg-primary-700 sm:hover:bg-gray-50 dark:sm:hover:bg-gray-700 border-r border-gray-200 dark:border-gray-700 transition-colors uppercase tracking-wider">
                        Today
                    </button>
            
                    <!-- NEXT -->
                    <button onclick="changeWeek(1)"
                        class="flex items-center justify-center py-3 px-6 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <span class="hidden sm:inline text-sm font-medium">Next</span>
                        <i class="fas fa-chevron-right sm:ml-2"></i>
                    </button>
            
                </div>
            </div>

            <!-- Week Display -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[800px]">
                        <thead class="bg-gray-50 dark:bg-gray-700">
                            <tr id="headerRow">
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300 w-20">Time</th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Mon<br><span class="text-xs font-normal" id="monDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Tue<br><span class="text-xs font-normal" id="tueDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Wed<br><span class="text-xs font-normal" id="wedDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Thu<br><span class="text-xs font-normal" id="thuDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Fri<br><span class="text-xs font-normal" id="friDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Sat<br><span class="text-xs font-normal" id="satDate"></span></th>
                                <th class="px-2 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Sun<br><span class="text-xs font-normal" id="sunDate"></span></th>
                            </tr>
                        </thead>
                        <tbody id="calendarBody" class="divide-y divide-gray-200 dark:divide-gray-700">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Appointment Modal -->
    <div id="appointmentModal" class="fixed inset-0 bg-black/50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-xl font-semibold text-gray-800 dark:text-white">New Appointment</h3>
            </div>
            <form id="appointmentForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Patient</label>
                    <select id="appointmentPatient" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <option value="">Select patient</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Date</label>
                    <input type="date" id="appointmentDate" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Time (15 min intervals)</label>
                    <select id="appointmentTime" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Price ($)</label>
                    <input type="number" id="appointmentPrice" step="0.01"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                        placeholder="e.g. 50.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Note</label>
                    <textarea id="appointmentNote" rows="3"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500"
                        placeholder="Additional notes..."></textarea>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" id="deleteAppointmentBtn" onclick="deleteAppointment()" hidden
                        class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
                        Delete
                    </button>
                    <button type="button" onclick="closeAppointmentModal()"
                        class="flex-1 px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-white rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition-colors">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== DATA ====================
        let currentWeekOffset = 0;
        let editingAppointmentId = null;

        // One-time cleanup of old demo patient data
        //localStorage.removeItem('patients');

        // Initialize data from localStorage
        let appointments = JSON.parse(localStorage.getItem('appointments')) || [];
        
        // Load patients from localStorage only
        let patients = JSON.parse(localStorage.getItem('patients')) || [];

        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // ==================== THEME ====================
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        // Set active nav
        document.getElementById('navAppointments').classList.add('bg-primary-100', 'dark:bg-primary-900', 'text-primary-600', 'dark:text-primary-400');

        // ==================== CALENDAR ====================
        function getWeekDates() {
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay() + 1 + (currentWeekOffset * 7));

            const dates = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                dates.push(date);
            }
            return dates;
        }

        function renderCalendar() {
            const dates = getWeekDates();
            const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
            const today = new Date().toISOString().split('T')[0];

            // Highlight today's column in header
            const headerRow = document.getElementById('headerRow');
            const headerCells = headerRow.querySelectorAll('th');
            
            days.forEach((day, i) => {
                const date = dates[i];
                const dateStr = date.toISOString().split('T')[0];
                const isToday = dateStr === today;
                
                document.getElementById(day + 'Date').textContent = 
                    date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                // Make today's date bold and add background
                const dateSpan = document.getElementById(day + 'Date');
                if (isToday) {
                    dateSpan.classList.remove('font-normal');
                    dateSpan.classList.add('font-bold', 'bg-primary-200', 'dark:bg-primary-800', 'px-2', 'py-1', 'rounded');
                } else {
                    dateSpan.classList.add('font-normal');
                    dateSpan.classList.remove('font-bold', 'bg-primary-200', 'dark:bg-primary-800', 'px-2', 'py-1', 'rounded');
                }
            });

            const tbody = document.getElementById('calendarBody');
            let html = '';

            // Show only round hours (8-20)
            for (let hour = 8; hour <= 20; hour++) {
                html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30">`;
                html += `<td class="px-2 py-2 text-center text-sm text-gray-600 dark:text-gray-400">${hour}:00</td>`;

                days.forEach((day, dayIndex) => {
                    const date = dates[dayIndex];
                    const dateStr = date.toISOString().split('T')[0];
                    const hourStr = `${hour}:00`;
                    const isToday = dateStr === today;

                    // Find all appointments for this hour - compare hour part of time
                    const slotAppointments = appointments.filter(a => {
                        if (a.date !== dateStr) return false;
                        const apptHour = parseInt(a.time.split(':')[0]);
                        return apptHour === hour;
                    }).sort((a, b) => a.time.localeCompare(b.time));

                    let cellContent = '';
                    let cellClass = '';

                    // Color coding based on appointment status
                    const todayDate = new Date().toISOString().split('T')[0];
                    
                    // Today's column has lighter background, or if there are appointments
                    if (slotAppointments.length > 0 || isToday) {
                        cellClass = 'bg-primary-50/50 dark:bg-primary-900/10';
                        cellContent = slotAppointments.map(a => {
                            // Determine background color based on date and price
                            let bgClass = 'bg-primary-500'; // default blue for future
                            if (a.date < todayDate) {
                                // Past appointment
                                if (a.price && parseFloat(a.price) > 0) {
                                    bgClass = 'bg-green-500'; // green for paid
                                } else {
                                    bgClass = 'bg-red-500'; // red for unpaid
                                }
                            }
                            return `<div class="text-xs px-2 py-1 mb-1 block w-full ${bgClass} text-white rounded cursor-pointer hover:opacity-90 whitespace-nowrap" 
                                title="${a.patientName} - ${a.time}${a.price ? ' - $' + parseFloat(a.price).toFixed(2) : ''}" onclick="event.stopPropagation(); viewAppointment(${a.id})">
                                ${a.patientName} - ${a.time}
                            </div>`;
                        }).join('');
                    }

                    // Cell with + button on the right
                    html += `<td class="px-1 py-1 text-center text-sm border-l border-gray-200 dark:border-gray-700 relative ${cellClass}" style="min-height: 50px; position: relative; width: 100px;">`;
                    html += `<div class="flex flex-col items-center pr-6">`;
                    html += `<div class="w-auto">${cellContent}</div>`;
                    html += `</div>`;
                    // + button on right side of cell
                    html += `<button class="absolute right-1 top-1/2 -translate-y-1/2 w-5 h-5 flex items-center justify-center `;
                    html += `bg-gray-200 dark:bg-gray-400 hover:bg-green-500 dark:hover:bg-green-500 rounded text-xs font-bold `;
                    html += `text-gray-700 dark:text-gray-800 hover:text-white transition-colors z-10 shrink-0"`;
                    html += ` onclick="event.stopPropagation(); openNewAppointmentModal('${dateStr}', '${hourStr}')" `;
                    html += ` title="Add appointment">+</button>`;
                    html += `</td>`;
                });

                html += `</tr>`;
            }

            tbody.innerHTML = html;
        }

        function changeWeek(offset) {
            currentWeekOffset += offset;
            renderCalendar();
        }

        function goToToday() {
            currentWeekOffset = 0;
            renderCalendar();
        }

        // ==================== APPOINTMENT MODAL ====================
        function openNewAppointmentModal(date = '', time = '') {
            editingAppointmentId = null;
            const modal = document.getElementById('appointmentModal');
            modal.classList.remove('hidden');
            
            document.querySelector('#appointmentModal h3').textContent = 'New Appointment';
            document.getElementById('deleteAppointmentBtn').hidden = true;

            // Build patient dropdown from localStorage patients (firstName + lastName)
            const select = document.getElementById('appointmentPatient');
            let patientOptions = '<option value="">Select patient</option>';
            patients.forEach(p => {
                const fullName = `${p.firstName || ''} ${p.lastName || ''}`.trim();
                patientOptions += `<option value="${fullName}">${fullName}</option>`;
            });
            select.innerHTML = patientOptions;

            // Check for patient from URL parameter (scheduling from patient card)
            const urlParams = new URLSearchParams(window.location.search);
            const preselectedPatient = urlParams.get('patient');
            if (preselectedPatient) {
                select.value = preselectedPatient;
                // Clear the URL parameter after using it
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            document.getElementById('appointmentDate').value = date || new Date().toISOString().split('T')[0];
            
            // Extract hour from time parameter (e.g., "9:00" -> 9)
            const hourFromTime = time ? parseInt(time.split(':')[0]) : 9;
            
            const timeSelect = document.getElementById('appointmentTime');
            let timeOptions = '';
            // Only show times for the selected hour
            for (let m = 0; m < 60; m += 15) {
                const timeVal = `${hourFromTime}:${m.toString().padStart(2, '0')}`;
                timeOptions += `<option value="${timeVal}" ${timeVal === time ? 'selected' : ''}>${timeVal}</option>`;
            }
            timeSelect.innerHTML = timeOptions;

            document.getElementById('appointmentPrice').value = '';
            document.getElementById('appointmentNote').value = '';
        }

        function viewAppointment(id) {
            const appointment = appointments.find(a => a.id === id);
            if (!appointment) return;

            editingAppointmentId = id;
            const modal = document.getElementById('appointmentModal');
            modal.classList.remove('hidden');
            
            document.querySelector('#appointmentModal h3').textContent = 'View/Edit Appointment';
            document.getElementById('deleteAppointmentBtn').hidden = false;

            // Build patient dropdown from localStorage patients
            const select = document.getElementById('appointmentPatient');
            let patientOptions = '<option value="">Select patient</option>';
            patients.forEach(p => {
                const fullName = `${p.firstName || ''} ${p.lastName || ''}`.trim();
                patientOptions += `<option value="${fullName}" ${fullName === appointment.patientName ? 'selected' : ''}>${fullName}</option>`;
            });
            select.innerHTML = patientOptions;

            document.getElementById('appointmentDate').value = appointment.date;
            
            // Extract hour from appointment time
            const apptHour = parseInt(appointment.time.split(':')[0]);
            
            const timeSelect = document.getElementById('appointmentTime');
            let timeOptions = '';
            // Only show times for the selected hour
            for (let m = 0; m < 60; m += 15) {
                const timeVal = `${apptHour}:${m.toString().padStart(2, '0')}`;
                timeOptions += `<option value="${timeVal}" ${timeVal === appointment.time ? 'selected' : ''}>${timeVal}</option>`;
            }
            timeSelect.innerHTML = timeOptions;

            document.getElementById('appointmentPrice').value = appointment.price || '';
            document.getElementById('appointmentNote').value = appointment.note || '';
        }

        function closeAppointmentModal() {
            document.getElementById('appointmentModal').classList.add('hidden');
        }

        function deleteAppointment() {
            if (editingAppointmentId && confirm('Are you sure you want to delete this appointment?')) {
                appointments = appointments.filter(a => a.id !== editingAppointmentId);
                localStorage.setItem('appointments', JSON.stringify(appointments));
                closeAppointmentModal();
                renderCalendar();
            }
        }

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const appointmentData = {
                patientName: document.getElementById('appointmentPatient').value,
                date: document.getElementById('appointmentDate').value,
                time: document.getElementById('appointmentTime').value,
                price: document.getElementById('appointmentPrice').value,
                note: document.getElementById('appointmentNote').value
            };

            if (editingAppointmentId) {
                const index = appointments.findIndex(a => a.id === editingAppointmentId);
                if (index !== -1) {
                    appointments[index] = { ...appointments[index], ...appointmentData };
                }
            } else {
                appointmentData.id = Date.now();
                appointments.push(appointmentData);
            }

            localStorage.setItem('appointments', JSON.stringify(appointments));

            closeAppointmentModal();
            renderCalendar();
            alert(editingAppointmentId ? 'Appointment updated!' : 'Appointment saved!');
        });

        // Initialize
        renderCalendar();
    </script>
</body>
</html>
