    <script>
        // One-time cleanup of old demo patient data
        //localStorage.removeItem('patients');

        let patients = [];
        let appointments = [];

        let currentPatientId = null;
        let editingAppointmentId = null;
        let sortColumn = 'name';
        let sortDirection = 'asc';

        const patientsRef = db.collection('patients');
        const appointmentsRef = db.collection('appointments');

        function loadPatientsFromCache() {
            return patientsRef.get({ source: 'cache' })
                .then(snapshot => {
                    patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderPatients();
                })
                .catch(() => {});
        }

        function listenPatients() {
            patientsRef.onSnapshot((snapshot) => {
                patients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderPatients();
            });
        }

        function loadAppointmentsFromCache() {
            return appointmentsRef.get({ source: 'cache' })
                .then(snapshot => {
                    appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                })
                .catch(() => {});
        }

        function listenAppointments() {
            appointmentsRef.onSnapshot((snapshot) => {
                appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            });
        }

        loadPatientsFromCache();
        listenPatients();
        loadAppointmentsFromCache();
        listenAppointments();

        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        // ==================== THEME ====================
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        // Set active nav
        document.getElementById('navPatients').classList.add('bg-primary-100', 'dark:bg-primary-900', 'text-primary-600', 'dark:text-primary-400');

        // ==================== SORTING ====================
        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            renderPatients();
        }

        // ==================== PATIENTS ====================
        function renderPatients() {
            const tbody = document.getElementById('patientsTable');
            const empty = document.getElementById('patientsEmpty');
            const search = document.getElementById('searchInput').value.toLowerCase();

            // Filter patients by search
            let filtered = patients.filter(p => {
                const fullName = (p.firstName + ' ' + p.lastName).toLowerCase();
                return fullName.includes(search) || 
                       (p.phone || '').toLowerCase().includes(search) || 
                       (p.email || '').toLowerCase().includes(search);
            });

            // Sort patients
            filtered.sort((a, b) => {
                let aVal, bVal;
                if (sortColumn === 'name') {
                    aVal = (a.firstName + ' ' + a.lastName).toLowerCase();
                    bVal = (b.firstName + ' ' + b.lastName).toLowerCase();
                } else {
                    aVal = (a[sortColumn] || '').toLowerCase();
                    bVal = (b[sortColumn] || '').toLowerCase();
                }
                if (sortDirection === 'asc') {
                    return aVal.localeCompare(bVal);
                } else {
                    return bVal.localeCompare(aVal);
                }
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer" onclick="viewPatient('${p.id}')">
                    <td class="px-4 py-3 text-gray-800 dark:text-white">${p.firstName} ${p.lastName}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-300">${p.phone || '-'}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-300">${p.email || '-'}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="event.stopPropagation(); editPatient('${p.id}')" class="px-3 py-1 bg-primary-500 hover:bg-primary-600 text-white text-sm rounded mr-1 transition-colors">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deletePatient('${p.id}')" class="px-3 py-1 bg-red-500 hover:bg-red-600 text-white text-sm rounded transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function openPatientModal(patient = null) {
            document.getElementById('patientModal').classList.remove('hidden');
            document.getElementById('patientForm').reset();
            document.getElementById('patientModalTitle').textContent = patient ? 'Edit Patient' : 'Add Patient';
            
            if (patient) {
                document.getElementById('patientFirstName').value = patient.firstName || '';
                document.getElementById('patientLastName').value = patient.lastName || '';
                document.getElementById('patientEmail').value = patient.email || '';
                document.getElementById('patientPhone').value = patient.phone || '';
                document.getElementById('patientAddress').value = patient.address || '';
                document.getElementById('patientDOB').value = patient.dob || '';
                document.getElementById('patientAllergies').value = patient.allergies || '';
                document.getElementById('patientDiagnoses').value = patient.diagnoses || '';
                document.getElementById('patientNotes').value = patient.notes || '';
                document.getElementById('patientForm').dataset.editId = patient.id;
            } else {
                delete document.getElementById('patientForm').dataset.editId;
            }
        }

        function closePatientModal() {
            document.getElementById('patientModal').classList.add('hidden');
        }

        function editPatient(id) {
            const patient = patients.find(p => p.id === id);
            if (patient) {
                openPatientModal(patient);
            }
        }

        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const editId = document.getElementById('patientForm').dataset.editId;
            const patient = {
                firstName: document.getElementById('patientFirstName').value,
                lastName: document.getElementById('patientLastName').value,
                email: document.getElementById('patientEmail').value,
                phone: document.getElementById('patientPhone').value,
                address: document.getElementById('patientAddress').value,
                dob: document.getElementById('patientDOB').value,
                allergies: document.getElementById('patientAllergies').value,
                diagnoses: document.getElementById('patientDiagnoses').value,
                notes: document.getElementById('patientNotes').value
            };

            if (editId) {
                patientsRef.doc(editId).update(patient);
            } else {
                patientsRef.add(patient);
            }

            closePatientModal();
            renderPatients();
            alert('Patient saved!');
        });

        function deletePatient(id) {
            if (confirm('Are you sure you want to delete this patient?')) {
                patientsRef.doc(id).delete();
            }
        }

        // ==================== PATIENT DETAIL ====================
        function viewPatient(id) {
            currentPatientId = id;
            const patient = patients.find(p => p.id === id);
            if (!patient) return;

            // Render patient info table
            const infoTable = document.getElementById('patientInfoTable');
            infoTable.innerHTML = `
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Name:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white font-medium">${patient.firstName} ${patient.lastName}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Email:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.email || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Phone:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.phone || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Address:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.address || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Date of Birth:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.dob || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Allergies:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.allergies || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Diagnoses:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.diagnoses || '-'}</td>
                </tr>
                <tr class="grid grid-cols-2 gap-4">
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-400">Note:</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${patient.notes || '-'}</td>
                </tr>
            `;

            // Render appointments table - load from global appointments
            const patientName = (patient.firstName + ' ' + patient.lastName).trim();
            renderAppointmentsForPatient(patientName);

            document.getElementById('patientDetailModal').classList.remove('hidden');
        }

        function renderAppointmentsForPatient(patientName) {
            const tbody = document.getElementById('visitsTable');
            const empty = document.getElementById('visitsEmpty');
            
            // Filter appointments for this patient
            const patientAppointments = appointments.filter(a => a.patientName === patientName);

            if (patientAppointments.length === 0) {
                tbody.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            // Sort by date/time descending
            patientAppointments.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));

            tbody.innerHTML = patientAppointments.map(v => `
                <tr>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${v.date} ${v.time}</td>
                    <td class="px-3 py-2 text-gray-600 dark:text-gray-300">${v.note || '-'}</td>
                    <td class="px-3 py-2 text-gray-800 dark:text-white">${v.price ? '$' + parseFloat(v.price).toFixed(2) : '-'}</td>
                    <td class="px-3 py-2 text-right">
                        <button onclick="editAppointmentFromPatient('${v.id}')" class="px-2 py-1 bg-primary-500 hover:bg-primary-600 text-white text-xs rounded mr-1 transition-colors">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteAppointmentFromPatient('${v.id}')" class="px-2 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function editAppointmentFromPatient(appointmentId) {
            const appointment = appointments.find(a => a.id === appointmentId);
            if (!appointment) return;
            
            editingAppointmentId = appointmentId;
            
            document.getElementById('editApptDate').value = appointment.date;
            document.getElementById('editApptTime').value = appointment.time;
            document.getElementById('editApptNote').value = appointment.note || '';
            document.getElementById('editApptPrice').value = appointment.price || '';
            
            document.getElementById('editAppointmentPatientModal').classList.remove('hidden');
        }
        
        function closeEditAppointmentPatientModal() {
            document.getElementById('editAppointmentPatientModal').classList.add('hidden');
            editingAppointmentId = null;
        }
        
        document.getElementById('editAppointmentPatientForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const appointmentData = {
                note: document.getElementById('editApptNote').value,
                price: parseFloat(document.getElementById('editApptPrice').value) || 0
            };
            
            await db.collection('appointments').doc(editingAppointmentId).update(appointmentData);
            
            closeEditAppointmentPatientModal();
            viewPatient(currentPatientId);
            alert('Appointment updated!');
        });

        function deleteAppointmentFromPatient(appointmentId) {
            if (!confirm('Are you sure you want to delete this appointment?')) return;
            
            db.collection('appointments').doc(appointmentId).delete().then(() => {
                closeEditAppointmentPatientModal();
                viewPatient(currentPatientId);
            });
        }

        function closePatientDetailModal() {
            document.getElementById('patientDetailModal').classList.add('hidden');
            currentPatientId = null;
        }

        // ==================== SCHEDULE APPOINTMENT FROM PATIENT ====================
        function scheduleAppointmentFromPatient() {
            const patient = patients.find(p => p.id === currentPatientId);
            if (!patient) return;
            
            // Close patient detail modal
            closePatientDetailModal();
            
            // Redirect to appointments page with patient pre-selected by ID
            window.location.href = `appointments.html?patientId=${encodeURIComponent(patient.id)}`;
        }

        // Initialize
        renderPatients();
    </script>
</body>
</html>
